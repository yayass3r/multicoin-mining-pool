global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Mining Pool Metrics
  - job_name: 'mining-pool'
    static_configs:
      - targets: ['mining-pool:10000']
    metrics_path: '/metrics'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
